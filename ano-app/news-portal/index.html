<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Personalized News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ONBOARDING SCREEN -->
  <div id="onboarding" class="screen active">
    <div class="onboard-bg"></div>
    <div class="onboard-inner">
      <div class="onboard-logo">PULSE</div>
      <h1 class="onboard-title">News that<br /><em>knows you.</em></h1>
      <p class="onboard-sub">Pick topics you love. We'll handle the rest.</p>

      <div class="topic-grid" id="topicGrid"></div>

      <div class="onboard-actions">
        <div class="user-id-row">
          <label>Your ID</label>
          <input id="userIdInput" type="text" placeholder="e.g. user_001" value="demo_user_001" />
        </div>
        <button id="startBtn" class="btn-primary" disabled>Build my feed →</button>
      </div>
    </div>
  </div>

  <!-- FEED SCREEN -->
  <div id="feedScreen" class="screen">
    <header class="site-header">
      <div class="header-left">
        <span class="logo">PULSE</span>
        <span class="tagline">Powered by ano algorithm</span>
      </div>
      <div class="header-right">
        <span id="headerUserId" class="user-pill"></span>
        <button id="refreshBtn" class="btn-icon" title="Refresh feed">↻</button>
        <button id="logoutBtn" class="btn-icon" title="Change topics">⚙</button>
      </div>
    </header>

    <div class="feed-layout">
      <aside class="sidebar">
        <h3 class="sidebar-title">Your Topics</h3>
        <div id="topicPills" class="topic-pills"></div>
        <div class="sidebar-divider"></div>
        <h3 class="sidebar-title">Feed Stats</h3>
        <div id="feedStats" class="stats-block"></div>
        <div class="sidebar-divider"></div>
        <h3 class="sidebar-title">Event Log</h3>
        <div id="eventLog" class="event-log"></div>
      </aside>

      <main class="feed-main">
        <div class="feed-toolbar">
          <h2 class="feed-heading">Your Feed</h2>
          <span id="postCount" class="post-count"></span>
        </div>
        <div id="feedContainer" class="feed-grid"></div>
        <div id="loadingState" class="loading-state">
          <div class="spinner"></div>
          <p>Ranking your feed…</p>
        </div>
        <div id="emptyState" class="empty-state" style="display:none">
          <p>No articles yet. Try refreshing.</p>
        </div>
      </main>
    </div>
  </div>

  <!-- ARTICLE MODAL -->
  <div id="articleModal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <button id="modalClose" class="modal-close">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
